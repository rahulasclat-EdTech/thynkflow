name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout code ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      # ── 3. Setup Java 17 ────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Setup Android SDK ────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install dependencies ─────────────────────────
      - name: Install npm dependencies
        working-directory: mobile-app
        run: npm install

      # ── 6. Install Expo CLI ─────────────────────────────
      - name: Install Expo CLI
        run: npm install -g @expo/cli

      # ── 7. Prebuild Android (generates android/ folder) ─
      - name: Expo Prebuild
        working-directory: mobile-app
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # ── 8. Make gradlew executable ──────────────────────
      - name: Make gradlew executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      # ── 9. Cache Gradle dependencies ────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile-app/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 10. Build Release APK ───────────────────────────
      - name: Build Release APK
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── 11. Rename APK with version ─────────────────────
      - name: Rename APK
        run: |
          VERSION=${{ github.event.inputs.version }}
          cp mobile-app/android/app/build/outputs/apk/release/app-release.apk \
             mobile-app/android/app/build/outputs/apk/release/ThynkFlow-v${VERSION}.apk

      # ── 12. Upload APK as artifact ──────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ThynkFlow-APK-v${{ github.event.inputs.version }}
          path: mobile-app/android/app/build/outputs/apk/release/ThynkFlow-v${{ github.event.inputs.version }}.apk
          retention-days: 30

      # ── 13. Show APK size ───────────────────────────────
      - name: Show APK info
        run: |
          echo "✅ Build successful!"
          ls -lh mobile-app/android/app/build/outputs/apk/release/*.apk
