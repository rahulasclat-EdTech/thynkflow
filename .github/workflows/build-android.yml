name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: mobile-app
        run: npm install

      - name: Update version in app.json
        working-directory: mobile-app
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${{ github.event.inputs.version }}';
            app.expo.android = app.expo.android || {};
            app.expo.android.versionCode = Date.now();
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Version updated to ${{ github.event.inputs.version }}');
          "

      - name: Build APK on Expo servers
        working-directory: mobile-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_URL=$(eas build --platform android --profile preview --non-interactive --json --no-wait | jq -r '.[0].buildUrl // .[0].id')
          echo "Build started: $BUILD_URL"
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          eas build:wait --platform android --status finished

      - name: Download APK
        working-directory: mobile-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          APK_URL=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          echo "Downloading APK from: $APK_URL"
          curl -L "$APK_URL" -o build.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThynkFlow-APK-v${{ github.event.inputs.version }}
          path: mobile-app/build.apk
          retention-days: 30
